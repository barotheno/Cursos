<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titulos HTML</title>
</head>
<body>
    <h1>Ejemplo de Parrafos</h1>
    <p>Primera linea de de parrafo <br> segunda linea de parrafo</p>
    <hr>
    <p>Tercera linea de parrafo nuevo bajo la linea de separacion</p>

    <!--Con "br" creamos un salto de linea
        Con "hr" creamos una linea que separa un parrafo de otro
    -->   
</body>
</html>
