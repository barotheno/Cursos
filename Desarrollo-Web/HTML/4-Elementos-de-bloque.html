        Ecisten dos tipos de elementos:
            Bloque:
                Ocupan todo el espacio posible horizontalmente
                    h1 - h2
                    p
                    hr (linea horizontal) (Indica cambio de tema)
                    pre (preformateado) (Muestra el contenido tal y como lo escribimos en el codigo)
                    blockuote (bloque de cita)
                    div (division)
                    
            Linea:
                Se van colocando en la misma linea
                    
                    em = Da importancia a un segmento de texto en comcreto
                    strong = Texto mas importante
                    small = Texto menos importante
                    wbr = Corta una palabra super larga
                    br (breaking role) (salto de linea)
                    spam
                    b(bold) = estilos (negrita)
                    u(underline) = estilos (subbrayado)
                    i(italc) = estilos (cursiva)
                    cite (cita en linea)
                    sub = sub indice
                    sup = superindice
