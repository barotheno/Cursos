<!DOCTYPE html><!--Indica que tipo de documento es-->
<html lang="es"><!--Es la etiqueta mas importante, dentro de ella va todo el código HTML-->
                <!--Indicamos con el atributo "lang=es"al navegador, en que idioma es nuestra página-->
    <head><!--En esta etiqueta va, la configuracion de la pagina, lo que el usuario no ve-->
        <meta http-equiv="Content-Type" content="text/html;charset=UTF-8"><!--Especifica que tipo de codificacion de caracteres tenemos-->
        <meta name="description" content="Bienvenidos a mi página web"><!--Es la descripción que ven los navegadores-->
        <link rel="icon" href=""><!--Nos permite traer recursos como css, iconos etc-->
        <script src=""></script><!--Nos conecta con un script externo-->
        <title></title><!--Es el titulo de la página web-->
    </head>
    <body><!--Aqui va todo el cuerpo de la pagina web, todo lo que es visible para el usuario-->
        <h1><!--Titulo de cabecera uno, hasta h6, de importancia de 1 a 6-->
            Titulo de primer nivel
        </h1>
            <p><!--Creación de parrafos-->
                Es un gran ejemplo de como crear encabezados y parrafos
            </p>
        <h2>
            Titulo de segundo nivel
        </h2>
        <h3>
            Titulo de tercer nivel
        </h3>
        <h4>
            Titulo de cuarto nivel 
        </h4>
        <h5>
            Titulo de quinto nivel
        </h5>
        <h6>
            Titulo de sexto nivel
        </h6>
    </body>
</html>
