<!DOCTYPE html><!--Indica que tipo de documento es-->
<html lang="en"><!--En la etiqueta HTML, va todo el contenido y el atributo "lang" es el idioma-->
    <head><!--Todo lo que es importante para cargar el proyecto, pero no es visible para el usuario-->
        <!--Las etiquetas META, dan información al navegador-->
        <meta charset="UTF-8"><!--Indicar el formato-->
        <meta name="description" content="Esta página tiene cosas de gatitos"><!--Indica la descripción al navegador-->
        <meta name="robots" content="index,follow"><!--Para que los buscadores nos indexen-->
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"><!--Responsive-->
        <link rel="stylesheet" href="style.css"><!--Nos carga un codumento de estilos css-->
        <title>Document</title>
    </head>
    <body><!--Aqui va todo lo que verá el usuario-->
        
    </body>
</html>
